name: Aggiorna Feed RSS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Installa dipendenze Python
        run: pip install beautifulsoup4 lxml --break-system-packages -q

      - name: Scarica feed e immagini
        run: |
          echo "Avvio raccolta feed e download immagini..."
          python3 parse_feed.py
          if [ ! -s feed.json ]; then
            echo "ERRORE: feed.json vuoto"
            exit 1
          fi
          echo "Feed OK: $(python3 -c "import json; d=json.load(open('feed.json')); print(str(d['count'])+' articoli')")"
          echo "Immagini scaricate: $(ls imgs/ 2>/dev/null | wc -l)"

      - name: Commit feed.json e immagini
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Aggiungi feed.json e cartella imgs/
          git add feed.json
          git add imgs/ 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nessuna modifica."
          else
            git commit -m "chore: aggiorna feed e immagini [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
