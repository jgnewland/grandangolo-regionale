name: Aggiorna Feed RSS

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica feed RSS
        run: |
          curl -s --max-time 30 \
               -A "Mozilla/5.0 (compatible; GrandangoloRegionale/1.0)" \
               -L "https://www.grandangoloagrigento.it/feed" \
               -o feed_raw.xml
          if [ ! -s feed_raw.xml ]; then
            echo "ERRORE: feed vuoto"
            exit 1
          fi
          echo "Scaricato $(wc -c < feed_raw.xml) bytes"

      - name: Converti XML in JSON
        run: python3 parse_feed.py

      - name: Commit feed.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica."
          else
            git commit -m "chore: aggiorna feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
