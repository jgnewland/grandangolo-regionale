name: Aggiorna Feed RSS

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scarica tutti i feed RSS
        run: |
          echo "Avvio raccolta feed da tutte le fonti..."
          python3 parse_feed.py
          if [ ! -s feed.json ]; then
            echo "ERRORE: feed.json vuoto o non generato"
            exit 1
          fi
          echo "Feed generato: $(python3 -c "import json; d=json.load(open('feed.json')); print(str(d['count'])+' articoli da '+str(len(d['fonti']))+' fonti')")"

      - name: Commit feed.json aggiornato
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica al feed."
          else
            git commit -m "chore: aggiorna feed RSS [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
